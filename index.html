<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перенаправление на список мультфильмов</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2rem 3rem;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .timer {
            font-size: 5rem;
            font-weight: bold;
            margin: 1rem 0;
            letter-spacing: 5px;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-family: monospace;
        }
        .message {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
        }
        .link {
            color: #ffd966;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px solid rgba(255,217,102,0.5);
        }
        .link:hover {
            border-bottom-color: #ffd966;
        }
        .note {
            font-size: 0.9rem;
            margin-top: 2rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="message">
            🎬 Вы будете перенаправлены на подборку лучших мультфильмов через
        </div>
        <div class="timer" id="countdown">5</div>
        <div class="note">
            Если ничего не произошло, <a href="https://www.film.ru/compilation/200-luchshih-multfilmov/sort/viewers" class="link">нажмите сюда</a>.
        </div>
    </div>

    <script>
        // --- НАСТРОЙКИ ---
        const TARGET_URL = "https://www.film.ru/compilation/200-luchshih-multfilmov/sort/viewers";
        const DELAY_SECONDS = 5;
        // -----------------

        let remaining = DELAY_SECONDS;
        const countdownElement = document.getElementById("countdown");

        function updateTimer() {
            countdownElement.textContent = remaining;
        }

        function redirect() {
            window.location.href = TARGET_URL;
        }

        const interval = setInterval(() => {
            remaining--;
            updateTimer();

            if (remaining <= 0) {
                clearInterval(interval);
                redirect();
            }
        }, 1000);

        updateTimer();
    </script>
</body>
</html>
